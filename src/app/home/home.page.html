<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
       G00474354
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  
  <h2>Today’s Trending Movies</h2>

  <div *ngFor="let movie of movies">
    <h3>{{movie.title}}</h3>

    <img
      *ngIf="movie.poster_path"
      [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path"width="150"
>
    <p>{{movie.overview}}</p>
  </div>
</ion-content>
