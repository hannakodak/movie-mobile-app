<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Favourite Movies</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="goHome()">
        <ion-icon name="home"> </ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">favourites</ion-title>
    </ion-toolbar>
  </ion-header>

  <div *ngFor="let movie of favourites">
    <ion-card>
      <ion-card-content>
        <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" width="150">
        <div>{{movie?.title}} </div>

        <div>
          <ion-button (click)="openMovie(movie)">
            Details
          </ion-button>

          <ion-button (click)="remove(movie.id)">
            Remove
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>
