<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Favourite Movies</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">favourites</ion-title>
    </ion-toolbar>
  </ion-header>

  <div *ngFor="let movie of favourites">
    {{movie?.title}}

  <ion-button (click)="remove(movie.id)">
    Remove
  </ion-button>

</div>

</ion-content>
