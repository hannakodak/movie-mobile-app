<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{movie?.title}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <p>{{movie?.overview}}</p>

  <h3>Cast</h3>
  <div *ngFor="let actor of cast">
    <img
      *ngIf="actor.profile_path"
      [src]="'https://image.tmdb.org/t/p/w200' + actor.profile_path"
      width="100"
    >

    <p *ngIf="!actor.profile_path">No image</p>

    <div>
      {{ actor.name }} - {{ actor.character }}
    </div>
  </div>

  <h3>Crew</h3>
  <div *ngFor="let person of crew">
    <img
      *ngIf="person.profile_path"
      [src]="'https://image.tmdb.org/t/p/w200' + person.profile_path"
      width="100"
    >

    <p *ngIf="!person.profile_path">No image</p>
    
    <div>
     {{ person.name }} - {{ person.job }}
   </div>
  </div>
</ion-content>
